services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teacher-administration-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://app:app@mysql:3306/teacher_admin
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: 80
    ports:
      - '3000:80'

  mysql:
    image: mysql:8.4
    container_name: teacher-admin-mysql
    environment:
      MYSQL_DATABASE: teacher_admin
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql-data:
